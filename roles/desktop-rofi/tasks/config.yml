---
- name: Copy rofi snippets
  ansible.builtin.copy:
    src: "{{ src_snippets }}/{{ item }}"
    dest: "{{ dst_snippets }}"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0700"
  loop: "{{ rofi_snippets }}"
  when: rofi_snippets is defined

- name: Create rofi folder
  ansible.builtin.file:
    path: "{{ target_user_dir }}/.config/rofi"
    state: "directory"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0700"

- name: Copy rofi config
  ansible.builtin.copy:
    src: "{{ src_dotfiles }}/.config/rofi/config.rasi"
    dest: "{{ target_user_dir }}/.config/rofi/config.rasi"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0700"

- name: Copy rofi themes
  ansible.builtin.copy:
    src: "{{ src_dotfiles }}/.config/rofi/themes"
    dest: "{{ target_user_dir }}/.config/rofi"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0700"
