- name: Install vim
  become: true
  ansible.builtin.apt:
    name:
      - liblua5.3-dev
      - liblua5.1-dev
      - lua5.1
      - lua5.3
      - vim-nox

- name: Copy vim config
  ansible.builtin.copy:
    src: "{{ src_dotfiles }}/{{ item }}"
    dest: "{{ target_user_dir }}/{{ item }}"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0700"
  loop: "{{ vim_files }}"
  when: vim_files is defined
