---
- name: Create user "{{ identity_obj.username }}"
  ansible.builtin.user:
    name: "{{ identity_obj.username }}"
    password: "{{ identity_obj.password | password_hash('sha512') }}"
    shell: /bin/bash
    state: present

- name: Ensure .ssh directory exists
  file:
    path: "/home/{{ identity_obj.username }}/.ssh"
    state: directory
    owner: "{{ identity_obj.username }}"
    group: "{{ identity_obj.username }}"
    mode: "0700"
  when: identity_obj.username != 'root'

- name: Deploy SSH keypairs for {{ identity_obj.username }}
  when: identity_obj.keypairs is defined
  include_tasks: bootstrap_keypair.yml
  loop: "{{ identity_obj.keypairs }}"
  loop_control:
    loop_var: keypair
