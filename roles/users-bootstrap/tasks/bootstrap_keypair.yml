- name: Deploy private key {{ keypair.filename }}
  copy:
    content: "{{ keypair.private_key }}"
    dest: "/home/{{ identity_obj.username }}/.ssh/{{ keypair.filename }}"
    owner: "{{ identity_obj.username }}"
    group: "{{ identity_obj.username }}"
    mode: "0600"

- name: Deploy public key {{ keypair.filename }}.pub
  copy:
    content: "{{ keypair.public_key }}"
    dest: "/home/{{ identity_obj.username }}/.ssh/{{ keypair.filename }}.pub"
    owner: "{{ identity_obj.username }}"
    group: "{{ identity_obj.username }}"
    mode: "0644"
