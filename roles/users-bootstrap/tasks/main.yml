---
- name: Get list of identity names for this host
  set_fact:
    user_identity_names: >-
      {{
        config_hosts.hosts[inventory_hostname]['users']
        if inventory_hostname in config_hosts.hosts and 'users' in config_hosts.hosts[inventory_hostname]
        else config_defaults.hosts[inventory_hostname]['users']
      }}

- name: Ensure all user identities are configured
  include_tasks: bootstrap_user.yml
  loop: "{{ user_identity_names }}"
  loop_control:
    loop_var: identity_name
  vars:
    identity_obj: "{{ identities[identity_name] }}"
