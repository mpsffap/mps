- hosts: hive
  become: true
  vars_files:
    - "../vars/vault_users_{{ build_type }}.yml"
    - "../vars/vault_config_{{ build_type }}.yml"
  vars:
    build_type: test
    target_user: "all"
    state: "present"
    user_action: "add"
    admin_group: "admin"
    deployment_group: "deployment"

  roles:
    - users-management
